name: MoonURI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: chawyehsu/setup-moonup@v1

      - name: Run MoonBit Check
        run: moon check

      - name: Run MoonBit Tests
        run: moon test
